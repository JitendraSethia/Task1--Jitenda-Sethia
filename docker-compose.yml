# One-command Postgres + backend for the AI-First CRM (satisfies the assignment's
# MySQL/Postgres database preference).
#
#   1. (optional) put your Groq key in a repo-root .env:  GROQ_API_KEY=gsk_...
#   2. docker compose up --build
#   3. run the frontend locally:  cd frontend && npm install && npm run dev
#      (Vite proxies /api -> http://localhost:8000, the backend below)
#
# The backend runs on PostgreSQL here; local `uvicorn` still defaults to SQLite.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hcp_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hcp_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/hcp_crm
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_MODEL_REASONING: ${GROQ_MODEL_REASONING:-llama-3.3-70b-versatile}
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"

volumes:
  pgdata:
